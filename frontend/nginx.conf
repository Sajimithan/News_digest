server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all API + SSE routes to the backend container
    location ~ ^/(chat|update|news|health|job|debug|events|stock) {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;

        # Required for SSE to work (disables buffering, keeps connection alive)
        proxy_set_header   Connection        '';
        proxy_set_header   Cache-Control     'no-cache';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_buffering    off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # Serve React SPA — fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
