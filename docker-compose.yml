services:

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: technews_backend
    restart: unless-stopped
    env_file: ./backend/.env          # provides GROQ_API_KEY and any other secrets
    environment:
      DB_PATH: data/news.db           # write DB into the mounted volume directory
    ports:
      - "8000:8000"                   # optional: expose directly for debugging
    volumes:
      - db_data:/app/data             # persist SQLite database across restarts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── React + Nginx frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: technews_frontend
    restart: unless-stopped
    ports:
      - "3000:80"                     # browse at http://localhost:3000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
