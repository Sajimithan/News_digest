version: '3.8'

services:

  # ── FastAPI backend (pulled from Docker Hub) ────────────────────────────────
  backend:
    image: ${DOCKER_USERNAME}/technews-backend:latest
    container_name: technews_backend
    restart: always
    env_file: ./backend/.env          # provides GROQ_API_KEY and any other secrets
    environment:
      DB_PATH: data/news.db
    ports:
      - "127.0.0.1:8000:8000"         # Only expose to localhost (behind Nginx)
    volumes:
      - db_data:/app/data
    networks:
      - technews
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── React + Nginx frontend (pulled from Docker Hub) ──────────────────────────
  frontend:
    image: ${DOCKER_USERNAME}/technews-frontend:latest
    container_name: technews_frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - technews
    environment:
      - BACKEND_URL=http://backend:8000

volumes:
  db_data:
    driver: local

networks:
  technews:
    driver: bridge

