# ─────────────────────────────────────────────────────────────────────────────
# /etc/nginx/sites-available/technews
#
# Replace every occurrence of "example.com" with your real domain name.
#
# Deploy steps:
#   sudo ln -s /etc/nginx/sites-available/technews /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d example.com -d www.example.com
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;

    server_name _;  # serves on IP — replace with domain when you get one

    # Certbot will insert HTTPS-redirect and certificate directives here.
    # After running certbot the plain-HTTP block becomes a redirect-only block
    # and a new server { listen 443 ssl; } block is added automatically.

    # ── Serve the React SPA ──────────────────────────────────────────────────
    root /var/www/technews/frontend/dist;
    index index.html;

    # SPA fallback: unknown paths return index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── SSE (Server-Sent Events) — must come BEFORE the general API block ────
    # /events?client_id=<id>  — keep the connection open for streaming
    location /events {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Disable buffering so events are forwarded to the browser immediately
        proxy_buffering    off;
        proxy_cache        off;

        # Keep-alive: suppress the "Connection: close" header
        proxy_set_header   Connection '';
        chunked_transfer_encoding on;

        # Hold the connection for up to 1 hour
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── All other backend API routes ─────────────────────────────────────────
    # Matches: /chat  /update  /news  /health  /job  /debug  /stock  /stock/...
    location ~ ^/(chat|update|news|health|job|debug|stock) {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow large request bodies (article payloads)
        client_max_body_size 10m;
    }
}
