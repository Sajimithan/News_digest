name: Deploy to EC2 (Docker)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker-build.yml'
      - '.github/workflows/docker-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 host key
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Wait for EC2 SSH readiness
        run: |
          max_attempts=60
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if ssh -o ConnectTimeout=5 -o StrictHostKeyChecking=accept-new ubuntu@${{ secrets.EC2_HOST }} "echo SSH ready"; then
              echo "SSH connection established"
              break
            fi
            attempt=$((attempt + 1))
            echo "Attempt $attempt/$max_attempts: Waiting for EC2 SSH..."
            sleep 5
          done
          
          if [ $attempt -eq $max_attempts ]; then
            echo "Failed to connect to EC2 after $max_attempts attempts"
            exit 1
          fi

      - name: Deploy script
        run: |
          cat > /tmp/deploy.sh << 'DEPLOY_SCRIPT'
          #!/bin/bash
          set -e
          
          echo "=== Deploying TechNews ==="
          
          # Docker login
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          
          # Create app directory
          mkdir -p /var/www/technews
          cd /var/www/technews
          
          # Update docker-compose.yml
          wget -q https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose-deploy.yml -O docker-compose.yml || \
          wget -q https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.yml -O docker-compose.yml
          
          # Update backend .env with latest secrets
          cat > backend.env <<'ENV'
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          ENV
          
          # Pull and deploy
          docker compose pull
          docker compose down || true
          docker compose up -d
          
          # Wait and verify
          sleep 5
          docker compose ps
          
          # Health check
          echo "Running health check..."
          for i in {1..30}; do
            if curl -f http://localhost:8000/health >/dev/null 2>&1; then
              echo "✓ Backend is healthy"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 1
          done
          
          echo "=== Deployment complete ==="
          DEPLOY_SCRIPT

      - name: Copy and execute deployment script
        run: |
          scp -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_rsa /tmp/deploy.sh ubuntu@${{ secrets.EC2_HOST }}:/tmp/deploy.sh
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} "bash /tmp/deploy.sh"
