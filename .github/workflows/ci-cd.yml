name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ─────────────────────────────────────────────────────────────────────────────
# REQUIRED GitHub repository secrets
#   LIGHTSAIL_HOST        Public IP or hostname of your Lightsail instance
#   LIGHTSAIL_USER        SSH username (usually "ubuntu")
#   LIGHTSAIL_SSH_KEY     Private SSH key (paste the full PEM content)
#
# Optional secret (used to write .env on the server during first deploy):
#   BACKEND_ENV           Full contents of backend/.env on the server
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. CI — lint / type-check / build ──────────────────────────────────────
  ci:
    name: CI checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Backend checks ──────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Smoke-test backend import
        working-directory: backend
        env:
          # Provide dummy values so config / providers don't raise at import
          GROQ_API_KEY: dummy
          GUARDIAN_API_KEY: dummy
          NEWSAPI_API_KEY: dummy
          NEWSAPIAI_API_KEY: dummy
          ALPHAVANTAGE_API_KEY: dummy
          FINNHUB_API_KEY: dummy
        run: python -c "from app.main import app; print('Backend import OK')"

      # ── Frontend checks ─────────────────────────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Vite production build
        working-directory: frontend
        run: npx vite build --outDir dist

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1


  # ── 2. Deploy — only on push to main (not on PRs) ──────────────────────────
  deploy:
    name: Deploy to Lightsail
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      # ── SSH agent ───────────────────────────────────────────────────────────
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIGHTSAIL_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H "${{ secrets.LIGHTSAIL_HOST }}" >> ~/.ssh/known_hosts

      # ── Sync backend source ─────────────────────────────────────────────────
      - name: Rsync backend → server
        run: |
          rsync -az --delete \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.env' \
            --exclude 'data/' \
            backend/ \
            ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/var/www/technews/backend/

      # ── Install Python deps & restart service ───────────────────────────────
      - name: Deploy backend on server
        run: |
          ssh ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} << 'EOF'
            set -e
            cd /var/www/technews/backend

            # Create venv if it doesn't exist yet
            if [ ! -d ".venv" ]; then
              python3 -m venv .venv
            fi

            .venv/bin/pip install --quiet --upgrade pip
            .venv/bin/pip install --quiet -r requirements.txt

            sudo systemctl restart technews-backend
            sudo systemctl is-active --quiet technews-backend && echo "Service running OK"
          EOF

      # ── Sync frontend dist ──────────────────────────────────────────────────
      - name: Rsync frontend dist → server
        run: |
          rsync -az --delete \
            frontend/dist/ \
            ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/var/www/technews/frontend/dist/

      # ── Reload nginx ────────────────────────────────────────────────────────
      - name: Reload nginx
        run: |
          ssh ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} \
            "sudo nginx -t && sudo systemctl reload nginx"
