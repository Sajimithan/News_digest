name: "Phase 2 — Deploy Application"

# Runs automatically on push to main (backend/frontend/deploy changes).
# Can also be triggered manually via workflow_dispatch.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "deploy/**"
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1 — Build Frontend
  # ──────────────────────────────────────────────────────────────
  build-frontend:
    name: "Build Frontend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (tsc + vite)
        working-directory: frontend
        env:
          NODE_ENV: production
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ──────────────────────────────────────────────────────────────
  # JOB 2 — Deploy to EC2 (runs only after build passes)
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy to EC2"
    runs-on: ubuntu-latest
    needs: build-frontend
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      # ── Sync deploy config files (service + nginx) ────────────
      - name: Rsync deploy configs
        run: |
          rsync -az \
            deploy/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/technews/deploy/

      # ── Sync backend source ───────────────────────────────────
      - name: Rsync backend
        run: |
          rsync -az --delete \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.env' \
            --exclude 'venv/' \
            --exclude 'data/' \
            backend/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/technews/backend/

      # ── Install Python deps + restart service ─────────────────
      - name: Install backend deps & restart service
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            cd /var/www/technews/backend

            if [ ! -d "venv" ]; then
              python3.11 -m venv venv
            fi

            venv/bin/pip install --quiet --upgrade pip
            venv/bin/pip install --quiet -r requirements.txt

            sudo systemctl daemon-reload
            sudo systemctl restart technews-backend
            sudo systemctl is-active --quiet technews-backend \
              && echo "✅ Backend service running" \
              || (echo "❌ Backend service failed" && sudo journalctl -u technews-backend -n 30 && exit 1)
          EOF

      # ── Sync frontend dist ────────────────────────────────────
      - name: Rsync frontend dist
        run: |
          rsync -az --delete \
            frontend/dist/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/technews/frontend/dist/

      # ── Reload Nginx ──────────────────────────────────────────
      - name: Reload Nginx
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo nginx -t && sudo systemctl reload nginx && echo '✅ Nginx reloaded'"

      # ── Smoke test ────────────────────────────────────────────
      - name: Health check
        run: |
          sleep 3
          curl --fail --silent \
            "http://${{ secrets.EC2_HOST }}/health" \
            | grep -q '"status"' \
            && echo "✅ Health check passed" \
            || (echo "❌ Health check failed" && exit 1)
