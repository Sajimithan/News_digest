name: "Phase 2 — Deploy Application"

# Runs automatically on push to main (backend/frontend/deploy changes).
# Can also be triggered manually via workflow_dispatch.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "deploy/**"
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1 — Build Frontend
  # ──────────────────────────────────────────────────────────────
  build-frontend:
    name: "Build Frontend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (tsc + vite)
        working-directory: frontend
        env:
          NODE_ENV: production
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ──────────────────────────────────────────────────────────────
  # JOB 2 — Deploy to EC2 (runs only after build passes)
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy to EC2"
    runs-on: ubuntu-latest
    needs: build-frontend
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Wait for server SSH (with retry)
        run: |
          for i in {1..30}; do
            if timeout 5 ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null; then
              echo "✅ SSH is ready"
              exit 0
            fi
            echo "Attempt $i/30 — waiting for SSH..."
            sleep 5
          done
          echo "❌ SSH not reachable after 150 seconds"
          exit 1

      # ── Sync deploy config files (service + nginx) ────────────
      - name: Rsync deploy configs
        run: |
          rsync -az \
            deploy/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/technews/deploy/

      # ── Write .env on server — first time only ────────────────
      # Skips silently if .env already exists (protects live keys).
      # To update keys: delete .env on the server and redeploy.
      - name: Write .env (first time only)
        env:
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
        run: |
          if [ -z "$BACKEND_ENV" ]; then
            echo "⚠️  BACKEND_ENV secret not set — create /var/www/technews/backend/.env manually"
          else
            EXISTS=$(ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
              "test -f /var/www/technews/backend/.env && echo yes || echo no")
            if [ "$EXISTS" = "no" ]; then
              echo "$BACKEND_ENV" | ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
                "cat > /var/www/technews/backend/.env && chmod 600 /var/www/technews/backend/.env"
              echo "✅ .env written"
            else
              echo ".env already exists — skipping"
            fi
          fi

      # ── Install systemd service + nginx config (idempotent) ───
      # Safe to run on every deploy — always refreshes configs from deploy/.
      - name: Install service and Nginx config
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            # systemd service
            sudo cp /var/www/technews/deploy/technews-backend.service \
                    /etc/systemd/system/technews-backend.service
            sudo systemctl daemon-reload
            sudo systemctl enable technews-backend
            echo "✅ systemd service installed"

            # Nginx site config
            sudo cp /var/www/technews/deploy/nginx-technews.conf \
                    /etc/nginx/sites-available/technews
            sudo ln -sf /etc/nginx/sites-available/technews \
                        /etc/nginx/sites-enabled/technews
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t
            echo "✅ Nginx config installed"
          EOF

      # ── Sync backend source ───────────────────────────────────
      - name: Rsync backend
        run: |
          rsync -az --delete \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.env' \
            --exclude 'venv/' \
            --exclude 'data/' \
            backend/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/technews/backend/

      # ── Install Python deps + restart service ─────────────────
      - name: Install backend deps & restart service
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            cd /var/www/technews/backend

            if [ ! -d "venv" ]; then
              python3.11 -m venv venv
            fi

            venv/bin/pip install --quiet --upgrade pip
            venv/bin/pip install --quiet -r requirements.txt

            sudo systemctl daemon-reload
            sudo systemctl restart technews-backend
            sudo systemctl is-active --quiet technews-backend \
              && echo "✅ Backend service running" \
              || (echo "❌ Backend service failed" && sudo journalctl -u technews-backend -n 30 && exit 1)
          EOF

      # ── Sync frontend dist ────────────────────────────────────
      - name: Rsync frontend dist
        run: |
          rsync -az --delete \
            frontend/dist/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/technews/frontend/dist/

      # ── Reload Nginx ──────────────────────────────────────────
      - name: Reload Nginx
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo nginx -t && sudo systemctl reload nginx && echo '✅ Nginx reloaded'"

      # ── Smoke test ────────────────────────────────────────────
      - name: Health check
        run: |
          sleep 3
          curl --fail --silent \
            "http://${{ secrets.EC2_HOST }}/health" \
            | grep -q '"status"' \
            && echo "✅ Health check passed" \
            || (echo "❌ Health check failed" && exit 1)
